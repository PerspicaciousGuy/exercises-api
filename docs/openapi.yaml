openapi: 3.0.3
info:
  title: ExerciseDB API
  version: 0.1.0
  description: Public exercise catalog API for fitness app developers.
servers:
  - url: http://localhost:3000
    description: Local development
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      summary: Check API health
      operationId: getHealth
      tags:
        - Health
      security: []
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required:
                      - status
                      - service
                      - version
                      - environment
                    properties:
                      status:
                        type: string
                        example: ok
                      service:
                        type: string
                        example: exercisedb-api
                      version:
                        type: string
                        example: 0.1.0
                      environment:
                        type: string
                        example: development
  /auth/register:
    post:
      summary: Register a developer account and issue the first API key
      operationId: registerDeveloper
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: dev@example.com
                password:
                  type: string
                  minLength: 8
                  example: change-this-password
                name:
                  type: string
                  example: Example Developer
      responses:
        '201':
          description: Developer account and one-time plaintext API key
        '400':
          description: Invalid registration body
        '409':
          description: Email is already registered
  /auth/login:
    post:
      summary: Log in and issue a new API key
      operationId: loginDeveloper
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: dev@example.com
                password:
                  type: string
                  example: change-this-password
      responses:
        '200':
          description: Developer account and one-time plaintext API key
        '400':
          description: Invalid login body
        '401':
          description: Invalid credentials
  /me:
    get:
      summary: Get the current developer account
      operationId: getCurrentDeveloper
      tags:
        - Auth
      responses:
        '200':
          description: Current developer account and tier
        '401':
          description: Missing or invalid API key
  /me/keys:
    get:
      summary: List API keys for the current developer account
      operationId: listDeveloperApiKeys
      tags:
        - Auth
      responses:
        '200':
          description: API key metadata without plaintext key values
        '401':
          description: Missing or invalid API key
    post:
      summary: Create a new API key
      operationId: createDeveloperApiKey
      tags:
        - Auth
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  maxLength: 100
                  example: Mobile app
                expiresAt:
                  type: string
                  format: date-time
                  example: 2027-06-15T10:00:00.000Z
      responses:
        '201':
          description: API key metadata and one-time plaintext key
        '400':
          description: Invalid key creation body
        '401':
          description: Missing or invalid API key
  /me/keys/{id}:
    delete:
      summary: Revoke an API key
      operationId: revokeDeveloperApiKey
      tags:
        - Auth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Revoked API key metadata
        '401':
          description: Missing or invalid API key
        '404':
          description: API key was not found for the current developer
  /me/usage:
    get:
      summary: Get usage stats for the current developer account
      operationId: getDeveloperUsage
      tags:
        - Auth
      responses:
        '200':
          description: Tier limit and recent daily usage rows
        '401':
          description: Missing or invalid API key
  /exercises:
    get:
      summary: List public exercises
      operationId: listExercises
      tags:
        - Exercises
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: category
          in: query
          schema:
            type: string
            example: strength
        - name: difficulty
          in: query
          schema:
            type: string
            enum: [beginner, intermediate, advanced]
        - name: muscle
          in: query
          schema:
            type: string
            example: chest
        - name: equipment
          in: query
          schema:
            type: string
            example: bodyweight
        - name: search
          in: query
          schema:
            type: string
            example: push
        - name: updated_since
          in: query
          schema:
            type: string
            format: date-time
            example: 2026-06-15T10:00:00.000Z
        - name: include_deprecated
          in: query
          schema:
            type: boolean
            default: false
        - name: fields
          in: query
          schema:
            type: string
            example: id,slug,name
      responses:
        '200':
          description: Exercise summaries
        '400':
          description: Invalid query parameters
        '401':
          description: Missing or invalid API key
  /exercises/{id}:
    get:
      summary: Get an exercise by id
      operationId: getExerciseById
      tags:
        - Exercises
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Exercise detail
        '403':
          description: Premium content requires a pro or enterprise API tier
        '404':
          description: Exercise not found
  /exercises/{id}/related:
    get:
      summary: Get grouped related exercises for an exercise
      operationId: getRelatedExercises
      tags:
        - Exercises
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Grouped variations, progressions, and regressions
        '404':
          description: Exercise not found
  /exercises/{id}/variations:
    get:
      summary: Get exercise variations
      operationId: getExerciseVariations
      tags:
        - Exercises
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Variation exercise summaries
        '404':
          description: Exercise not found
  /exercises/{id}/progressions:
    get:
      summary: Get exercise progressions
      operationId: getExerciseProgressions
      tags:
        - Exercises
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Progression exercise summaries
        '404':
          description: Exercise not found
  /exercises/{id}/regressions:
    get:
      summary: Get exercise regressions
      operationId: getExerciseRegressions
      tags:
        - Exercises
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Regression exercise summaries
        '404':
          description: Exercise not found
  /exercises/slug/{slug}:
    get:
      summary: Get an exercise by slug
      operationId: getExerciseBySlug
      tags:
        - Exercises
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            example: push-up
      responses:
        '200':
          description: Exercise detail
        '403':
          description: Premium content requires a pro or enterprise API tier
        '404':
          description: Exercise not found
  /exercises/search:
    get:
      summary: Search public exercises by name, alias, or exact tag
      operationId: searchExercises
      tags:
        - Exercises
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            example: press
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Matching exercise summaries
        '400':
          description: Invalid query parameters
  /exercises/bulk:
    get:
      summary: Fetch multiple exercises by id
      operationId: getExercisesBulk
      tags:
        - Exercises
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
            example: exercise-id-1,exercise-id-2
      responses:
        '200':
          description: Exercise detail records
        '400':
          description: Missing or invalid ids
  /metadata:
    get:
      summary: Get catalog reference metadata and enum values
      operationId: getMetadata
      tags:
        - References
      responses:
        '200':
          description: Reference tables and enum values
  /muscles:
    get:
      summary: List muscles
      operationId: listMuscles
      tags:
        - References
      responses:
        '200':
          description: Muscle references
  /equipment:
    get:
      summary: List equipment
      operationId: listEquipment
      tags:
        - References
      responses:
        '200':
          description: Equipment references
  /categories:
    get:
      summary: List exercise categories
      operationId: listCategories
      tags:
        - References
      responses:
        '200':
          description: Category references
  /exercise-flags:
    get:
      summary: List exercise flags
      operationId: listExerciseFlags
      tags:
        - References
      responses:
        '200':
          description: Exercise flag references
  /joint-regions:
    get:
      summary: List joint regions
      operationId: listJointRegions
      tags:
        - References
      responses:
        '200':
          description: Joint region references
  /sync/metadata:
    get:
      summary: Get public catalog sync metadata
      operationId: getSyncMetadata
      tags:
        - Sync
      responses:
        '200':
          description: Catalog version, latest timestamps, resources, and sync limits
  /sync/exercises:
    get:
      summary: Sync changed public exercises
      operationId: syncExercises
      tags:
        - Sync
      parameters:
        - name: updated_since
          in: query
          schema:
            type: string
            format: date-time
            example: 2026-06-15T10:00:00.000Z
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: cursor
          in: query
          schema:
            type: string
            description: Opaque cursor returned by the previous sync page.
        - name: include_deprecated
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Changed exercise records, deleted/deprecated tombstones, and pagination cursor
        '400':
          description: Invalid sync query parameters
        '401':
          description: Missing or invalid API key
        '429':
          description: Daily usage limit exceeded
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    ProblemDetail:
      type: object
      description: >-
        RFC 9457 Problem Details. Returned by every error response with
        content type application/problem+json.
      required:
        - type
        - title
        - status
        - code
      properties:
        type:
          type: string
          format: uri
          description: Stable URI identifying the error type. Does not resolve.
          example: https://exercisedb-api.dev/errors/validation-error
        title:
          type: string
          description: Short human-readable summary of the error type.
          example: Validation Error
        status:
          type: integer
          description: HTTP status code, matching the response status.
          example: 400
        detail:
          type: string
          description: >-
            Explanation specific to this occurrence. Replaced with a generic
            message for 5xx responses so internals are never exposed.
          example: limit must be less than or equal to 100
        instance:
          type: string
          description: URI of the request that produced the error.
          example: /exercises?limit=500
        code:
          type: string
          description: >-
            Machine-readable error code. RFC 9457 extension member retained for
            programmatic error handling.
          example: VALIDATION_ERROR
